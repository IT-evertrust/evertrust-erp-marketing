# Render Blueprint — EverTrust ERP API only.
# Database lives on SUPABASE. DATABASE_URL = the SESSION pooler URI (IPv4, port 5432);
# its client budget is hard-capped (pool_size 15), so the app pool is bounded small via
# DATABASE_POOL_MAX (the db client defaults to 5) to leave room for overlapping deploys
# + migrations. The transaction pooler (6543) has far more headroom but needs prepared
# statements OFF — the db client auto-disables them for a :6543/pgbouncer=true URL (or
# set DATABASE_PREPARE=false), so you can switch DATABASE_URL to 6543 for more capacity.
# MIGRATION_DATABASE_URL (optional) points drizzle-kit migrate at the Supabase DIRECT
# connection so DDL never competes for pooler slots. Web lives on VERCEL (root directory
# erp-client). The AI stack (LiteLLM/Qdrant/SearXNG) stays on the Mac mini — see
# docs/team-hosting.md.

services:
  - type: web
    name: evertrust-api
    runtime: docker
    repo: https://github.com/evertrust-gmbh/evertrust-erp-marketing
    region: frankfurt          # EU residency
    plan: free                 # free = sleeps after ~15 min idle + EPHEMERAL uploads.
                               # Upgrade to `starter` + uncomment the disk block for
                               # always-on + durable uploaded documents.
    dockerfilePath: ./erp-server/Dockerfile
    dockerContext: .
    # Render runs the Docker Command without a shell — keep the two-token form.
    dockerCommand: sh /app/erp-server/api-start.sh
    healthCheckPath: /health
    autoDeploy: true
    # disk:                    # paid plans only — durable storage for uploads
    #   name: uploads
    #   mountPath: /var/uploads
    #   sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production       # gates the dev seed + switches pino transport
      - key: DATABASE_URL       # Supabase SESSION pooler URI (…pooler.supabase.com:5432)
        sync: false
      - key: DATABASE_POOL_MAX  # app pool cap; keep small under the session pooler's 15-client limit
        value: "5"
      # MIGRATION_DATABASE_URL (optional, sync:false) → Supabase DIRECT connection so
      # drizzle-kit migrate doesn't compete for pooler slots. Falls back to DATABASE_URL.
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE      # web (vercel.app) and API (onrender.com) are different
        value: "true"           # sites → secure + SameSite=none for the auth cookie
      - key: COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS       # set to the Vercel production URL after the web deploy
        sync: false
      # Authentication is REQUIRED in production — real users sign in with their
      # company Google account (the live deploy already enforces this). Keep this
      # "false" so a redeploy can never silently fall open to a public, no-login API.
      # (For a throwaway demo only, AUTH_DISABLED=true + a LOW-privilege
      # AUTH_DISABLED_USER_EMAIL serves a single impersonated user with no login.)
      - key: AUTH_DISABLED
        value: "false"
      - key: AUTH_DISABLED_USER_EMAIL
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads     # ephemeral on free; change to /var/uploads with a disk
      # n8n cloud wiring (values from the vault / erp-server/.env on the mini)
      - key: N8N_API_URL
        value: https://evertrustgmbh.app.n8n.cloud
      - key: N8N_API_KEY
        sync: false
      - key: ARSENAL_INGEST_TOKEN
        sync: false
      # Read AI → ERP webhook secret. Set in the dashboard, then put the SAME value in
      # the Read AI webhook URL as ?token=… (or the x-read-ai-token header). Blank =
      # the webhook returns 503 (disabled), so it's safe to deploy before it's minted.
      - key: READ_AI_WEBHOOK_SECRET
        sync: false
      - key: N8N_AIM_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/aim-deploy-campaign
      - key: N8N_CAMPAIGNS_LIST_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/erp-campaigns-list
      - key: N8N_LEAD_SATELLITE_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/wf03-lead-research
      - key: N8N_AMMO_FORGE_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/wf4-ammo-forge
      - key: N8N_SLEEPER_GRENADE_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/wf8-sleeper-grenade
      - key: N8N_PROVISION_HOT_LEADS_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/provision-hot-leads
      - key: N8N_HOT_LEADS_PIPELINE_WEBHOOK_URL
        value: https://evertrustgmbh.app.n8n.cloud/webhook/crm-customer
      # blank by design: BAZOOKA/REPLY GLOCK have no webhook triggers; no Hermes RFQ wf yet
      - key: ANTHROPIC_API_KEY  # blank = price-assist off
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-5-sonnet-latest
      # ── Reach + Activate (Growth Engine agents) ──────────────────────────────
      # The erp-agents Python `/run` monolith runs on the MAC MINI (Tailscale
      # Funnel), NOT on Render. Set AGENTS_BASE_URL in the dashboard to the funnel
      # URL once the mini service is up (see docs/reach-activate-prod-runbook.md).
      - key: AGENTS_BASE_URL    # e.g. https://mac-mini-ca-mac.tailc3d837.ts.net  (blank = Reach/Activate agent calls 503)
        sync: false
      - key: AGENT_TIMEOUT_MS
        value: "300000"
      # Background Lead-Satellite scrape leash (ms). Detached from the request thread,
      # so it can run long; 7200000 = 2h headroom for big nationwide sweeps. Per-org
      # "Scrape timeout" (Config page, minutes) overrides this when set.
      - key: REACH_SCRAPE_TIMEOUT_MS
        value: "7200000"
      # Reach send safety: 'test' redirects EVERY send to REACH_TEST_RECIPIENT
      # (capped at REACH_TEST_SEND_CAP). Keep 'test' for the first prod deploy;
      # flip to 'live' (per-org) only after the prod smoke-test passes.
      - key: REACH_SEND_MODE
        value: test
      - key: REACH_TEST_RECIPIENT
        value: admin@evertrust-germany.de
      - key: REACH_TEST_SEND_CAP
        value: "3"
