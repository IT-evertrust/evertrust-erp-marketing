name: erp-server

# Infra for the ERP backend. n8n runs on n8n CLOUD (local n8n retired 2026-06-10;
# its old volumes erp-server_n8n_data / erp-server_n8n_postgres_data are kept on
# disk until the cloud migration is confirmed). The AI gateway stack lives in
# ../ai-stack/docker-compose.yml.

services:
  postgres:
    image: postgres:18-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-evertrust-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in erp-server/.env (see .env.example)}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      # /var/lib/postgresql (without /data) is correct ONLY for postgres 18+ images;
      # pre-18 tags need /var/lib/postgresql/data or data lands outside the volume
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evertrust-erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

volumes:
  postgres_data:

networks:
  erp-network:
    driver: bridge
