packages:
  - 'erp-server'
  - 'erp-client'
  - 'packages/*'
# pnpm 11 form (onlyBuiltDependencies was removed in v11 — don't re-add it,
# it is silently ignored).
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  argon2: true
  # testcontainers' optional native transports — not needed (we talk to the local
  # Docker socket, not SSH), so their build scripts are intentionally skipped.
  cpu-features: false
  esbuild: true
  protobufjs: false
  sharp: true
  ssh2: false
  unrs-resolver: true
